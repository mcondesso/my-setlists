line-length = 100
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E712",  # SQLAlchemy requires == True comparisons
]

[lint.per-file-ignores]
"tests/*" = ["E501"]  # ignore long lines in tests
